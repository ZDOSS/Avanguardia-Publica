name: Nightly ETL Scraper

on:
  schedule:
    # Run every day at 1:00 AM UTC
    - cron: '0 1 * * *'
  workflow_dispatch:
    inputs:
      state_unverified_enrichment_limit:
        description: 'Optional state LittleSis profile count for this run'
        required: false
        default: ''
      state_unverified_enrichment_offset:
        description: 'Optional zero-based state LittleSis start offset for this run'
        required: false
        default: ''
      house_roll_call_write_mode:
        description: 'Official House roll-call writes for this bounded manual run'
        required: true
        type: choice
        default: 'disabled'
        options:
          - 'disabled'
          - 'enabled'

permissions:
  contents: read

concurrency:
  group: nightly-etl
  cancel-in-progress: false

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          cd scraper
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests before production writes
        run: |
          cd scraper
          python -m unittest discover -s tests -v

      - name: Run pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          # Campaign-finance enrichment (optional; skipped if absent)
          FEC_API_KEY: ${{ secrets.FEC_API_KEY }}
          # State roll-call votes via OpenStates API (optional; skipped if absent)
          OPENSTATES_API_KEY: ${{ secrets.OPENSTATES_API_KEY }}
          # Bounded state LittleSis enrichment (unverified; optional)
          STATE_UNVERIFIED_ENRICHMENT_LIMIT: ${{ github.event.inputs.state_unverified_enrichment_limit || vars.STATE_UNVERIFIED_ENRICHMENT_LIMIT }}
          STATE_UNVERIFIED_ENRICHMENT_OFFSET: ${{ github.event.inputs.state_unverified_enrichment_offset || vars.STATE_UNVERIFIED_ENRICHMENT_OFFSET }}
          # Manual runs can opt in for bounded validation. Scheduled runs use the
          # repository variable and still default fail-closed when it is absent.
          HOUSE_ROLL_CALL_WRITE_MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.house_roll_call_write_mode || vars.HOUSE_ROLL_CALL_WRITE_MODE || 'disabled' }}
          # News API keys — all optional; aggregator falls back gracefully if absent
          CURRENTS_API_KEY: ${{ secrets.CURRENTS_API_KEY }}
          NEWSDATA_API_KEY: ${{ secrets.NEWSDATA_API_KEY }}
          THENEWSAPI_KEY: ${{ secrets.THENEWSAPI_KEY }}
          # Keep disabled unless a maintainer has reviewed and approved production usage.
          THENEWSAPI_PRODUCTION_APPROVED: ${{ vars.THENEWSAPI_PRODUCTION_APPROVED || 'false' }}
          # NEWSAPI_KEY is intentionally omitted here — dev-only (localhost)
        run: |
          cd scraper
          python main.py
