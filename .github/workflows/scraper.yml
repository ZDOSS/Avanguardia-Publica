name: Nightly ETL Scraper

on:
  schedule:
    # Run every day at 1:00 AM UTC
    - cron: '0 1 * * *'
  workflow_dispatch: # Allows manual trigger

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          cd scraper
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          # Campaign-finance enrichment (optional; skipped if absent)
          FEC_API_KEY: ${{ secrets.FEC_API_KEY }}
          # News API keys — all optional; aggregator falls back gracefully if absent
          CURRENTS_API_KEY: ${{ secrets.CURRENTS_API_KEY }}
          NEWSDATA_API_KEY: ${{ secrets.NEWSDATA_API_KEY }}
          THENEWSAPI_KEY: ${{ secrets.THENEWSAPI_KEY }}
          # NEWSAPI_KEY is intentionally omitted here — dev-only (localhost)
        run: |
          cd scraper
          python main.py
