version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: avanguardia
      POSTGRES_PASSWORD: avanguardia
      POSTGRES_DB: avanguardia
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://avanguardia:avanguardia@db:5432/avanguardia
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: "https://zdoss.github.io,http://localhost:5173"
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app

volumes:
  pgdata:
